data:
  definition:
  - content: for an aggregation data type that contains nested aggregation data types,
      first encountered base-type at some level of nesting that is not an anonymous
      aggregation type, a defined data type whose underlying type is an aggregation
      type, or a SELECT type whose working select list contains a single defined data
      type whose underlying type is an aggregation type
  terms:
  - type: expression
    normative_status: preferred
    designation: deepest underlying type
