data:
  definition:
  - content: combination of equipment and procedures that perform the selection, assignment
      of parameter values, derivation and execution of test cases, in conformance
      with an abstract test suite, and that can produce a conformance log
  notes:
  - content: The means of testing is provided by test realisers who are responsible
      for producing the executable test suites, procedures and executable software
      from standardised abstract test suites and abstract test methods.
  terms:
  - type: expression
    normative_status: preferred
    designation: means of testing
