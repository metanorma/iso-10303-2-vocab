data:
  definition:
  - content: model whose full details are immediately available without the need for
      any form of calculation
  notes:
  - content: In the case of product shape models, an explicit (or evaluated) shape
      model is a fully detailed model of the boundary representation or some related
      type, as defined in <<ISO_10303-42_2022>>. More specifically, an explicit model
      is a model that is not of the procedural or hybrid type, which may contain little
      or no explicit geometry.
  terms:
