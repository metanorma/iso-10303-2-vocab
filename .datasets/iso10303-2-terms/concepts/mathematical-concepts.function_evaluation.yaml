data:
  definition:
  - content: process of ascertaining either the outputs a function associates to given
      inputs, or an error indication if the function does not associate any outputs
      to the given inputs
  notes:
  - content: In the case of a computable function, the process amounts to carrying
      out the algorithm on the inputs to produce the outputs, or an error indication.
  terms:
  - type: expression
    normative_status: preferred
    designation: function evaluation
