data:
  definition:
  - content: |
      distance that measures how far apart are the two points, with
      dimensionality stem:[n], stem:[A] and stem:[B] in:

      [stem%unnumbered]
      ++++
      d(A,B) = sqrt(sum_(i=1)^n (B_i - A_i)^2)
      ++++

      [%key]
      stem:[A]:: stem:[{ a_{1}, ..., a_{n} }]
      stem:[B]:: stem:[{ b_{1}, ..., b_{n} }]
      stem:[n]:: is the number of dimensions in points stem:[A] and stem:[B]
  terms:
  - type: expression
    normative_status: preferred
    designation: Euclidean distance
  language_code: eng
  annotations: []
