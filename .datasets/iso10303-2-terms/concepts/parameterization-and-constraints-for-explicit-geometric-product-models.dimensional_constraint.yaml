data:
  definition:
  - content: constraint on the value of a dimension in a shape model
  examples:
  - content: In two dimensions, the specification of a distance between two lines
      only makes sense if the lines are parallel. If this distance is formulated as
      a dimensional constraint, then any change in the value of the distance requires
      that the underlying logical relationship of parallelism between the lines is
      maintained.
  notes:
  - content: There is a semantic difference between a and a . A dimension specifies
      a fixed quantitative relationship between elements in a shape model. It captures
      a static characteristic of the model, and has no behavioural semantics. A dimensional
      constraint also specifies a quantitative relationship between model elements,
      in this case not necessarily a fixed one, with the additional significance that
      A dimensional constraint may specify a numerical value, or a mathematical relationship
      from which a numerical value may be calculated.
  terms:
  - type: expression
    normative_status: preferred
    designation: dimensional constraint
