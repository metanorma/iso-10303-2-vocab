data:
  definition:
  - content: points and curves imported into the plane of a two-dimensional {{sketch}},
      but defined in terms of elements external to the sketch
  examples:
  - content: Examples of imported geometry are provided by projections of external
      points or curves onto the plane of a sketch. These elements are not subject
      to editing within the context of the sketch, since their defining elements lie
      outside it. Their purpose is to serve as reference elements for constraints
      on the sketch geometry.
  notes:
  - content: This definition applies only in the restricted context of <<ISO_10303-108_2005>>;
      the concept of imported geometry may have a wider meaning in other application
      areas.
  terms:
  - type: expression
    normative_status: preferred
    designation: imported geometry
