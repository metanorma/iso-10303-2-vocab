data:
  definition:
  - content: transformation process of generating an EXPRESS schema that does not
      contain interfaces, taking as input any EXPRESS schema or schemata compliant
      with any version of <<ISO_10303-11>>
  notes:
  - content: The original implementation methods included in ISO 10303 presupposed
      a data model consisting of a single schema, termed the longform schema.
  - content: The algorithm that defines the transformation process is specified in
      <<ISO_10303-11>>.
  terms:
  - type: expression
    normative_status: preferred
    designation: short-to-long-form generation
  - type: abbreviation
    normative_status: preferred
    designation: SHTOLO
