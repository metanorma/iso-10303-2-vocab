data:
  definition:
  - content: variable which has been specifically referenced by a quantifier in a
      quantifier expression
  examples:
  - content: The variable stem:[x] in the statement stem:[AA x(x = x)].
  - content: The variable stem:[x] in the set declaration stem:[{x|x^2 = x}].
  - content: The variable stem:[x] in the definite integral stem:[int_1^2 ln(x)dx].
  - content: The variable stem:[x] in the function definition stem:[f(x) -= x + 2].
  notes:
  - content: A bound variable is no longer available for substitution by a constant
      value. The semantics of the quantifier expression uses all possible values of
      the variable rather than one (perhaps undetermined) value.
  terms:
  - type: expression
    normative_status: preferred
    designation: bound variable
  language_code: eng
