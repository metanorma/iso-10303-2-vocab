data:
  definition:
  - content: shape where on any point of its boundary, typically consisting of faces
      and edges, one may create a sufficiently small sphere so that the interior of
      the sphere is divided into exactly two regions by this boundary
  notes:
  - content: This definition eliminates self-intersection of surfaces, surface intersections
      that are not along edges, and edges joining three or more faces.
  terms:
  - type: expression
    normative_status: preferred
    designation: 2-manifold
  language_code: eng
