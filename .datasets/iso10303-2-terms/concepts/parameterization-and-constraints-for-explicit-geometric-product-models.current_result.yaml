data:
  definition:
  - content: representative member of the family of models defined by a parametric
      model resulting from the assignment of their current values to all parameters
  notes:
  - content: In the shape modelling context a current result may be an explicit model
      such as a wireframe, surface or boundary representation solid model. Alternatively,
      it may be a procedural or hybrid model in which the values of all parameters
      are regarded as fixed.
  - content: Use of an explicit current result will be essential in the exchange of
      procedural or history-based models, though that is outside the scope of <<ISO_10303-108_2005>>.
      In that case the current result will be transmitted as a secondary model of
      the boundary representation or some closely related type, and used to check
      the accuracy of the result of re-evaluating a transmitted procedural model in
      the receiving system.
  - content: In the context of <<ISO_10303-108_2005>>, the current result may indicate
      which choice of solution was made in the sending system in the case of multiple
      constraint solutions.
  terms:
  - type: expression
    normative_status: preferred
    designation: current result
