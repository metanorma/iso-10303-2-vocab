data:
  definition:
  - content: relationship between tuples of mathematical objects called inputs and
      tuples of mathematical objects called outputs in which each tuple of inputs
      is related to at most one tuple of outputs, together with a mathematical space
      specifying the function domain and a mathematical space specifying the function
      range
  notes:
  - content: The phrase mathematical function implies a specification of the domain
      and range in addition to the pairing of inputs and outputs. See <<ISO_10303-50_2002,clause=5.2.1>>
      and <<ISO_10303-50_2002,clause=5.2.3>> for the reasons this definition was chosen
      for <<ISO_10303-50_2002>>.
  terms:
  - type: expression
    normative_status: preferred
    designation: mathematical function
  language_code: eng
  annotations: []
