data:
  definition:
  - content: function whose domain is either a Cartesian product of finite intervals
      of integers or the one-tuples from such a Cartesian product
  notes:
  - content: An element of such a domain is a subscript tuple. Evaluation of the function
      at such an element produces the "array entry" for that subscript tuple.
  terms:
  - type: expression
    normative_status: preferred
    designation: array function
  language_code: eng
