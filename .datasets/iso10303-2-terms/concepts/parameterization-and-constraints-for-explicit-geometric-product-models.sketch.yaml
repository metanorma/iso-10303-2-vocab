data:
  definition:
  - content: two-dimensional geometric construct used as input to certain three-dimensional
      modelling operations
  notes:
  - content: A sketch is made up of point and curve elements, which may be related
      by explicit constraints. Its elements may also be constrained with respect to
      {{imported geometry}}, which is invariant within the plane of the sketch. An
      example of a sketch is provided in <<ISO_10303-108_2005>>.
  - content: The definition given above is restricted to the context of CAD operations,
      but the representations provided for sketches in <<ISO_10303-108_2005>> are
      also suitable for the capture of parameterized drawings.
  terms:
  - type: expression
    normative_status: preferred
    designation: sketch
  language_code: eng
