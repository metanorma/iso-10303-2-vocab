data:
  definition:
  - content: variable which has not been bound by a quantifier in the expression in
      which it is used
  notes:
  - content: A free variable denotes an undetermined member of some set of possible
      values. There is an implicit assumption that it may be substituted by any constant
      denoting one of those values.
  terms:
  - type: expression
    normative_status: preferred
    designation: free variable
