data:
  definition:
  - content: |
      distance that measures how far apart are the two sets of points stem:[A]
      and stem:[B] in:

      [stem%unnumbered]
      ++++
      H(A,B) = max{ h(A, B), h(B,A) }
      ++++

      [%key]
      stem:[h(A,B)]:: is the directed Hausdorff distance from
        stem:[A] to stem:[B], stem:[max_{a in A} { min_{b in B} {d(a,b)} }]
      stem:[A]:: stem:[{ a_{1}, ..., a_{m} }]
      stem:[B]:: stem:[{ b_{1}, ..., b_{m} }]
      stem:[d(a,b)]:: is the {{Euclidean distance}} between the points stem:[a] and stem:[b]
  terms:
  - type: expression
    normative_status: preferred
    designation: Hausdorff distance
  - type: expression
    normative_status: admitted
    designation: HH
  language_code: eng
  annotations: []
