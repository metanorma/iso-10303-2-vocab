data:
  definition:
  - content: one or more layers of cells on the boundary of a mesh
  notes:
  - content: Each cell in a rind has a thickness much less than a typical dimension
      within the mesh. The topology of the cells in a rind is defined by the topology
      of the boundary edges or faces of the mesh and by the layers of the rind. The
      geometry of the cells in a rind is defined by the positions of the vertices
      on the boundary and by cell properties.
  - content: A rind is associated with external flow solution data in a fluid dynamics
      calculation.
