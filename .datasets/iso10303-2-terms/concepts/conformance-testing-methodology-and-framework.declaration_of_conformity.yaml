data:
  definition:
  - content: statement by a supplier claiming under his sole responsibility that an
      IUT is in conformity with a specific standard or other normative document
  notes:
  - content: Compare with attestation of conformity and certification of conformity.
  - content: The term "self certification" should not be used, in order to avoid any
      confusion with the concept of certification which should imply the involvement
      of a third party.
  terms:
  - type: expression
    normative_status: preferred
    designation: declaration of conformity
  - type: expression
    normative_status: admitted
    designation: declaration of conformance
  - type: expression
    normative_status: admitted
    designation: manufacturer's declaration of conformance
  language_code: eng
  annotations: []
