data:
  definition:
  - content: arcwise connected faceted solid such that, for a very small sphere, centred
      at any point on the boundary of the solid, the interior of the sphere is divided
      into precisely two regions
  notes:
  - content: One of these regions is inside the solid, the other is outside.
