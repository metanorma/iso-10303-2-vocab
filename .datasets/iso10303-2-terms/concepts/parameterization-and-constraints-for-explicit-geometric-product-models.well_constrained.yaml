data:
  definition:
  - content: defined in terms of a set of constraints that are both necessary and
      sufficient to allow the determination of a unique constraint solution
  notes:
  - content: In the ideal situation, only one solution satisfies all the constraints.
      In practice multiple solutions often arise. In an ISO 10303 model transfer using
      the capabilities defined in this document, the current result may often be used
      to determine which solutions were chosen by the original designer. For example,
      in two dimensions the constraint "Line 2 is parallel to Line 1 at distance 3"
      has two solutions; Line 2 may lie 3 units either to the left or the right of
      Line 1. The choice of solution actually made in the sending system will be evident
      from the current model. Another method which can be used to distinguish chosen
      solutions of multi-solution constraints or constraint sets is the specification
      of "near-points". These may be used, for example, to indicate the approximate
      desired location of a point of tangency. Several of the explicit geometric constraints
      defined in <<ISO_10303-108_2005,clause=7>> provide for the specification of
      near-points.
  terms:
  - type: expression
    normative_status: preferred
    designation: well constrained
  language_code: eng
