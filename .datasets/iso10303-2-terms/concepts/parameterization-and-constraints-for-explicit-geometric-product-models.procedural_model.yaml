data:
  definition:
  - content: model described in terms of the operation of a sequence of procedures
      (which may include the solution of constraint sets), as opposed to an explicit
      or evaluated model which captures the end result of applying those procedures
  notes:
  - content: Although procedural models are outside the scope of <<ISO_10303-108_2005>>,
      they are defined to make an important distinction between two fundamentally
      different modelling approaches. The present resource is intended to be compatible
      with <<ISO_10303-55>>, which provides representations for the exchange of procedurally
      defined models.
  terms:
  - type: expression
    normative_status: preferred
    designation: procedural model
  - type: expression
    normative_status: admitted
    designation: generative model
  - type: expression
    normative_status: admitted
    designation: history-based model
