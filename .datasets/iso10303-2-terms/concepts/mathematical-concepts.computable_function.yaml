data:
  definition:
  - content: mathematical function for which the relationship between tuples of inputs
      and tuples of outputs is expressible by means of an algorithm which takes the
      inputs and produces the related outputs
  notes:
  - content: All the mathematical functions of interest in the intended applications
      of <<ISO_10303-50_2002>> are computable. Nevertheless, the possibility of representing
      non-computable functions is not ruled out.
  terms:
  - type: expression
    normative_status: preferred
    designation: computable function
  language_code: eng
  annotations: []
