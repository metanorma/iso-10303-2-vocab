data:
  definition:
  - content: defined in terms of more constraints than are needed to determine a constraint
      solution
  notes:
  - content: In an overconstrained model, one or more of the constraints will be either
      redundant (i.e. consistent with all the others but not further limiting possible
      solutions) or inconsistent (i.e. not compatible with the others). An inconsistent
      constraint system has no solution. A designer may intentionally create redundant
      constraints in a model, but then care is necessary when editing the model to
      avoid introducing inconsistency.
  terms:
  - type: expression
    normative_status: preferred
    designation: overconstrained
