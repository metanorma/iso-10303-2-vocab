data:
  definition:
  - content: software system for solving sets of equations that are mathematical representations
      of constraint relationships
  notes:
  - content: Methods used by constraint solvers for determining solutions are outside
      the scope of <<ISO_10303-108_2005>>.
  - content: In straightforward cases a constraint set will have the same number of
      unknowns as equations. Ideally, however, a constraint solver should also handle
      underconstrained and overconstrained constraint sets having, respectively, more
      unknowns and less unknowns than the number of equations. The specification of
      system response in such cases is also outside the scope of <<ISO_10303-108_2005>>,
      but it could include the generation of diagnostic information or of partial
      solutions as appropriate.
  terms:
  - type: expression
    normative_status: preferred
    designation: constraint solver
  language_code: eng
  annotations: []
