data:
  definition:
  - content: intentions of the designer of a model with regard to how it may be instantiated
      or modified
  notes:
  - content: The aspects of design intent relevant to <<ISO_10303-108_2005>> are concerned
      with the information represented in the parameters and constraints associated
      with a model. More generally, design intent also includes the procedural or
      construction history of a model, which is the subject of <<ISO_10303-55>>. All
      aspects of design intent influence the behaviour of a model under editing operations.
  terms:
  - type: expression
    normative_status: preferred
    designation: design intent
