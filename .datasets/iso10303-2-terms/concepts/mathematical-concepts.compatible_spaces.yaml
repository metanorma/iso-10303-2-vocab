data:
  definition:
  - content: mathematical spaces whose intersection is not determined to be empty
      by the algorithm represented by the EXPRESS function *compatible_spaces*
  notes:
  - content: Two spaces are compatible if their intersection is not "obviously" empty.
      In practice, "obvious" is defined by what is detected by the algorithm. The
      purpose is to rule out some obvious nonsense while permitting ignorance.
  terms:
  - type: expression
    normative_status: preferred
    designation: compatible spaces
  language_code: eng
