data:
  definition:
  - content: base type of an entity attribute or an aggregation type is aggregate-dependent
      if the aggregate value, returned by the EXPRESS `TypeOf` function for this base
      type contains the name of a defined type whose underlying type is an aggregation
      data type or if the base type is directly an aggregation type
  terms:
  - type: expression
    normative_status: preferred
