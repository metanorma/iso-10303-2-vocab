data:
  definition:
  - content: abstract object from the domain of mathematics
  notes:
  - content: The terms mathematical object and mathematical value are formally synonymous
      in <<ISO_10303-50_2002>>. There is a tendency to favor the use of mathematical
      for simple objects like numbers, characters, and enumeration values, and to
      favor for complex objects like spaces, functions and expressions, but no formal
      distinction is being made.
  terms:
  - type: expression
    normative_status: preferred
    designation: mathematical object
  - type: expression
    normative_status: admitted
    designation: mathematical value
