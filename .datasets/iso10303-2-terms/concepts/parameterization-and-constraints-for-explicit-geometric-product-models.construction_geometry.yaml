data:
  definition:
  - content: geometry used as an aid in the construction of a shape that is not an
      element of the shape itself
  examples:
  - content: This concept may be illustrated by the case of a "spine" curve used in
      the generation of certain types of swept surfaces. A planar generating curve
      is defined, together with a reference point lying in its plane. The reference
      point is then swept along the spine curve, the plane of the generating curve
      being maintained normal to it. The generating curve sweeps out the desired surface.
      If the reference point does not lie on the generating curve the spine curve
      does not lie on the generated surface, and it is therefore classified as construction
      geometry.
  terms:
  - type: expression
    normative_status: preferred
    designation: construction geometry
  language_code: eng
  annotations: []
