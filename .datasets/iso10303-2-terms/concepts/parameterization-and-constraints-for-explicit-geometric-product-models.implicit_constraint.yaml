data:
  definition:
  - content: constraint that is not explicitly represented but is inherent in the
      action of some constructional operation used in building a model
  examples:
  - content: A hypothetical procedure `create_parallel_line` could be used in a procedural
      description of a model in two dimensions. Its input is Line 1 (assumed to exist
      before the procedure is used) and a distance. The output is Line 2, created
      by the procedure at the specified distance from Line 1. However, since Line
      2 does not exist until after the procedure has been invoked (i.e. the model
      has been at least partially ) the constraint is not explicit in the model defined
      purely in terms of the constructional procedure. It is merely implied by the
      nature of the procedure.
  notes:
  - content: An implicit constraint will be realized as a static relationship in the
      current result after the operation has been performed, but not generally recorded
      in the model as a corresponding explicit constraint.
  - content: This term is defined to make an important distinction between two fundamental
      approaches to constraint representation. The present resource is intended to
      be compatible with other resources for the exchange of procedurally defined
      models containing implicit constraints.
  terms:
  - type: expression
    normative_status: preferred
    designation: implicit constraint
  - type: expression
    normative_status: admitted
    designation: procedural constraint
