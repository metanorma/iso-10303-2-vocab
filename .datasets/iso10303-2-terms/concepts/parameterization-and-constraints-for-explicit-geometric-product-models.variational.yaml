data:
  definition:
  - content: defined in terms of explicitly specified parameters and constraints,
      allowing variation by change of parameter values, subject to continued satisfaction
      of imposed constraints
  examples:
  - content: |-
      Consider a configuration of two distinct lines through a given fixed point, both tangent to a circle with a fixed centre, and suppose that a parameter is associated with the radius of the circle. The constraints in this configuration (apart from the invariance of the two fixed points) are

      a. the requirement that both lines pass through the given point;
      b. the requirement that both lines are tangent to the circle.

      If now the radius of the circle is changed by varying the parameter value, a new configuration should result in which the circle and the two lines are all different from the originals but the constraints continue to be satisfied. This is an example of a variational configuration.
  terms:
  - type: expression
    normative_status: preferred
    designation: variational
