data:
  definition:
  - content: inclusion of one point set in another
  notes:
  - content: In the context of the explicit geometric constraint schema (see <<ISO_10303-108_2005>>)
      the points sets are points, curves and surfaces. An incidence constraint may,
      for example, require a line to lie on a surface, or a curve to pass through
      a set of points.
