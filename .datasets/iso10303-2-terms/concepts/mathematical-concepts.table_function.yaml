data:
  definition:
  - content: array function with the additional constraint that all the integer interval
      factor spaces of the domain either start at zero or at one
  notes:
  - content: The implication of the constraint is that only the relative values of
      the subscripts are significant. Hence, one can use pure relative positions (all
      subscript ranges start from zero), or pure ordinal positions (all subscript
      ranges start from one), depending on the usual practice in the application area.
  terms:
  - type: expression
    normative_status: preferred
    designation: table function
  language_code: eng
  annotations: []
