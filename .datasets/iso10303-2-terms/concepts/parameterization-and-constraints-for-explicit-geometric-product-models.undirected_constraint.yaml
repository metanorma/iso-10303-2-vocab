data:
  definition:
  - content: constraint having no reference element, requiring the constrained condition
      to hold amongst all pairs of members of a set of constrained elements
  notes:
  - content: This term should not be confused with *symmetry_geometric_constraint*,
      which is a specific type of geometric constraint defined in <<ISO_10303-108_2005,clause=7.4.25>>.
