  definition:
  - content: schema of interest in a group of interrelated schemas that form a, possibly
      cyclic, directed graph
  notes:
  - content: There can be one or more primary schemas within the graph, where the
      other schemas in the graph are only there to support the primary schema.
  - content: The primary schema has a special role in the conversion of a shortform
      schema into a longform schema.
