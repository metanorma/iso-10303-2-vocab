data:
  definition:
  - content: information model that uses the common resources necessary to satisfy
      the information requirements and constraints of an application reference model,
      within an application module
  examples:
  - content: Three-dimensional geometry information models are common resources used
      in many MIMs. However, an application module describing colour will not use
      three-dimensional geometry information models as a resource.
  notes:
  - content: The term common resources is not meant to imply that all such information
      models are required to be used in a module interpreted model regardless of domain
      or application.
  terms:
  - type: expression
    normative_status: preferred
    designation: module interpreted model
  - type: expression
    normative_status: admitted
    designation: MIM
  language_code: eng
