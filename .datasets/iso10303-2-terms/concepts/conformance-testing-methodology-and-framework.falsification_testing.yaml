data:
  definition:
  - content: test method developed to find errors in the implementation
  notes:
  - content: If errors are found, one can correctly deduce the implementation does
      not conform to the standard; however, the absence of errors does not necessarily
      imply the converse. Falsification testing can only demonstrate non-conformance.
  - content: Compare with verification testing.
  terms:
  - type: expression
    normative_status: preferred
    designation: falsification testing
  language_code: eng
