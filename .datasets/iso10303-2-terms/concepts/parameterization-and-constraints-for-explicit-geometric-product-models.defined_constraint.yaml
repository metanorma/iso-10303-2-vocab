  definition:
  - content: constraint whose semantics are assumed to be understood by both the sending
      and receiving system so that its mathematical details do not need to be transmitted
      explicitly
  notes:
  - content: Collections of defined constraints may be created for use in specific
      application areas. The explicit geometric constraints specified in <<ISO_10303-108_2005,clause=7>>
      are examples of defined constraints whose application area is shape modelling.
      They all define constraint relationships descriptively rather than algebraically.
