data:
  definition:
  - content: assembly with a harness topology, consisting of cables or wires to enable
      electrical or optical connectivity, grouped together in one or more harness
      segments, each between two harness nodes in which the cables or wires either
      switch to other harness nodes or in which the cables and wires ends in connectors,
      contact members or terminal lugs
  terms:
  - type: expression
    normative_status: preferred
    designation: wiring harness
