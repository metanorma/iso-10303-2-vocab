data:
  definition:
  - content: formalised initial and continuing process of ensuring a testing laboratory
      is competent to carry out specific (types of) tests
  notes:
  - content: The term "laboratory accreditation" covers the recognition of both the
      technical competence and the impartiality of a testing laboratory.
  - content: Accreditation is normally awarded following successful laboratory assessment
      and is followed by appropriate surveillance.
  terms:
  - type: expression
    normative_status: preferred
    designation: accreditation
  - type: expression
    normative_status: admitted
    designation: laboratory accreditation
