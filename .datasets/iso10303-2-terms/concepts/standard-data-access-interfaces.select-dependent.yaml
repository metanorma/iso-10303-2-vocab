data:
  definition:
  - content: base type of an entity attribute or an aggregation type is *select-dependent*
      if the aggregate value, returned by the EXPRESS *`TypeOf`* function for this
      base type contains the name of a defined type whose underlying type is a `SELECT`data
      type
