data:
  definition:
  - content: part of ISO 10303 that defines a group of resource constructs used as
      the basis for product data
  examples:
  - content: ISO 10303-42 is an integrated generic resource.
  - content: ISO 10303-104 is an integrated application resource.
  notes:
  - content: 'An integrated resource is classified into two types of resource parts:
      generic resources and application resources.'
  - content: The 4x to 6x numbering is reserved for integrated generic resources and
      the 1xx numbering is reserved for integrated application resources.
  terms:
  - type: expression
    normative_status: preferred
    designation: integrated resource
  - type: expression
    normative_status: admitted
