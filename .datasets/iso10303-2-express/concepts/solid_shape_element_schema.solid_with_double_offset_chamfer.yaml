  notes:
    - content: A *solid_with_double_offset_chamfer* is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_chamfered_edges,solid_with_chamfered_edges}} in which the chamfers are created as in the case of the *solid_with_single_offset_chamfer* except that the chamfer boundaries are offset by different distances from the edge being chamfered.
