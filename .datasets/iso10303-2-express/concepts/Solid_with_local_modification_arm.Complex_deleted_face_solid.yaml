  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Deleted_face_solid,Deleted_face_solid}}
      that represents the complex deleted face solid {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Complex_deleted_face_solid** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Deleted_face_solid,Deleted_face_solid}}
      in which selected faces have specified thicknesses differing from the general
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Deleted_face_solid.thickness,thickness}}
      inherited from the supertype {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Deleted_face_solid,Deleted_face_solid}}.
