---
data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Qualified_measure_arm.Type_qualifier,Type_qualifier}} that represents the pre defined type qualifier {{entity}}'
  notes:
    - content: |-
        A **Pre_defined_type_qualifier** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Qualified_measure_arm.Type_qualifier,Type_qualifier}} whose {{name,name}} has predefined value as specified in constant {{pre_defined_type_qualifiers,pre_defined_type_qualifiers}}:

        * 'minimum': the value is a minimum value;
        * 'maximum': the value is a maximum value;
        * 'nominal': the value is a nominal value;
        * 'specified': the value has been specified;
        * 'typical': the value is typical;
        * 'calculated': the value has been calculated;
        * 'designed': the value represents a value intended by the design;
        * 'estimated': the value has been estimated;
        * 'measured': the value has been measured;
        * 'required': the value represents a requirement;
        * 'set point': the value is used as an initialization value;
        * 'basic': the value is a basic value;
        * 'lower deviation': the value is maximum deviation in the negative direction from the nominal or basic value;
        * 'upper deviation': the value is maximum deviation in the positive direction from the nominal or basic value.
