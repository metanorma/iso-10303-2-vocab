data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Triangulated_shape_data_quality_arm.A3m_inapt_triangulated_shape_data,A3m_inapt_triangulated_shape_data}} that represents the self intersecting triangulated shell or solid {{entity}}'
  notes:
    - content: |-
        A **Self_intersecting_triangulated_shell_or_solid** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Triangulated_shape_data_quality_arm.A3m_inapt_triangulated_shape_data,A3m_inapt_triangulated_shape_data}} that asserts that
        {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Tessellated_geometry_arm.Triangulated_face,Triangulated_face}}s in the
        {{tsdqi_tessellated_shell,tsdqi_tessellated_shell}} or
        {{tsdqi_tessellated_solid,tsdqi_tessellated_solid}} do not intersect each other but the distance between them is smaller than the given tolerance.
