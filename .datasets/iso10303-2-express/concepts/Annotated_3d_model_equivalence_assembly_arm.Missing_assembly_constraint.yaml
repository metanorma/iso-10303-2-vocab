data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Annotated_3d_model_equivalence_assembly_arm.A3m_equivalence_criterion_of_assembly_data_structure,A3m_equivalence_criterion_of_assembly_data_structure}}
      that represents the missing assembly constraint {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Missing_assembly_constraint** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Annotated_3d_model_equivalence_assembly_arm.A3m_equivalence_criterion_of_assembly_data_structure,A3m_equivalence_criterion_of_assembly_data_structure}}
      that asserts that one or more assembly constraints between a component and its
      connected component in the comparing assembly data set do not have a corresponding
      constraint between the corresponding component and its connected component in
      the compared assembly data set.
