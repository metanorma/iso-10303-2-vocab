  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation_relationship,representation_relationship}} that represents the shape representation relationship {{entity}}'
  notes:
    - content: A **shape_representation_relationship** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation_relationship,representation_relationship}} in which at least one of the instances of the entity data type {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation,representation}} is a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_representation_schema.shape_representation,shape_representation}} or {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_representation_schema.shape_representation_reference,shape_representation_reference}}.
