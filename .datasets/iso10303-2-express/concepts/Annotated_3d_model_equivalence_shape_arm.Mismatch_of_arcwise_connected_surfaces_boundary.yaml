data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Annotated_3d_model_equivalence_shape_arm.A3m_equivalence_criterion_of_detailed_shape_data_content,A3m_equivalence_criterion_of_detailed_shape_data_content}}
      that represents the mismatch of arcwise connected surfaces boundary {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Mismatch_of_arcwise_connected_surfaces_boundary** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Annotated_3d_model_equivalence_shape_arm.A3m_equivalence_criterion_of_detailed_shape_data_content,A3m_equivalence_criterion_of_detailed_shape_data_content}}
      which detects the difference between boundary edges of the two compared {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Connected_face_set,Connected_face_set}}s,
      where the boundary edges mean the external boundary edges which are referred
      only once from a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Face,Face}}
      of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Connected_face_set,Connected_face_set}}.
