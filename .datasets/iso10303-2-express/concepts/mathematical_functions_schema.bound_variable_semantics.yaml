data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mathematical_functions_schema.variable_semantics,variable_semantics}}
      that represents the bound variable semantics {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: This type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:iso13584_generic_expressions_schema.variable_semantics,variable_semantics}}
      indicates that a variable is a bound variable whose semantics is determined
      by the quantifier expression which references the variable in its {{urn:iso:std:iso:10303:-2:ed-1:en:tech:iso13584_expressions_schema.variable,variables}}
      attribute.
