data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the fea shell section distribution idealisation relationship {{entity}}'
  notes:
    - content: |-
        An **fea_shell_section_distribution_idealisation_relationship** is a relationship between:

        * the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_definition_schema.property_definition,property_definition}} that is the variation of structural behaviour from point to point over a shell; and
        * a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.surface_section_field,surface_section_field}};

        which indicates that the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.surface_section_field,surface_section_field}} is an idealisation of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_definition_schema.property_definition,property_definition}} for the purpose of analysis.
