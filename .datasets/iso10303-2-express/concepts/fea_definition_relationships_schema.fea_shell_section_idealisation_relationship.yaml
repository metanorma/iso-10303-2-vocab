data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the fea shell section idealisation relationship {{entity}}'
  notes:
    - content: |-
        An **fea_shell_section_idealisation_relationship** is a relationship between:

        * a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_definition_schema.general_property,general_property}} that is the structural behaviour at a point on a shell; and
        * a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.surface_section,surface_section}};

        which indicates that the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.surface_section,surface_section}} is an idealisation of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_definition_schema.general_property,general_property}} for the purpose of analysis.
