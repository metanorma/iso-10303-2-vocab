data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:presentation_appearance_schema.styled_item,styled_item}}
      that represents the styled tessellated face or surface with single texture {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **styled_tessellated_face_or_surface_with_single_texture** is a type
      of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:presentation_appearance_schema.styled_item,styled_item}}
      that assigns a visual texture to tessellated geometry, which may be either a
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.tessellated_face,tessellated_face}}
      or a collection of tessellated faces defined in a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.tessellated_surface_set,tessellated_surface_set}}
      .
