data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the subset {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **Subset** is a relationship that is between:

      * set A; and
      * set B,

      that indicates:

      * each member of set A is also a member of set B.
