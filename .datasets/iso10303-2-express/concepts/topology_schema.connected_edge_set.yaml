data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.topological_representation_item,topological_representation_item}}
      that represents the connected edge set {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **connected_edge_set** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.topological_representation_item,topological_representation_item}},
      and is a set of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.edge,edge}}
      instances such that the domain of the edges together with their bounding vertices
      is arcwise connected.
