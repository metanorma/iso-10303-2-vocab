data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_composition_arm.Composite_shape_element,Composite_shape_element}} that represents the continuous shape element {{entity}}'
  notes:
    - content: A **Continuous_shape_element** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_composition_arm.Composite_shape_element,Composite_shape_element}} where the geometric elements associated with the underlying {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_property_assignment_arm.Shape_element,Shape_element}} members are touching and thus establish a continuous region.
