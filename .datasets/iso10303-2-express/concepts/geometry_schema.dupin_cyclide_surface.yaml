data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometry_schema.elementary_surface,elementary_surface}}
      that represents the dupin cyclide surface {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **dupin_cyclide_surface** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometry_schema.elementary_surface,elementary_surface}},
      that is a generalisation of a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometry_schema.toroidal_surface,toroidal_surface}}
      in which the radius of the generatrix varies as it is swept around the directrix,
      passing through a maximum and a minimum value.
