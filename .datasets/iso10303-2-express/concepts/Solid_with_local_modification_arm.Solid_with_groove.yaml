  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Solid_with_depression,Solid_with_depression}} that represents the solid with groove {{entity}}'
  notes:
    - content: A **Solid_with_groove** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Solid_with_depression,Solid_with_depression}} that results from the creation of a depression extending around a surface of revolution in such a way that its cross-sections are constant in any plane containing the axis of that surface.
