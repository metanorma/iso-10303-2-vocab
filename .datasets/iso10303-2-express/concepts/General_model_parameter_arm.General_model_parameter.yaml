  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Independent_property_arm.Independent_property,Independent_property}} that represents the general model parameter {{entity}}'
  notes:
    - content: An **General_model_parameter** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Independent_property_arm.Independent_property,Independent_property}} that is a named input/output of a model used in the definition of the interface, in the sense of exposed method of communicating with the model, to the model which is or may be provided with or result in an actual value when the model is used or invoked.
