data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.geometric_representation_item,geometric_representation_item}}
      that represents the primitive 2d {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **primitive_2d** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometry_schema.geometric_representation_item,geometric_representation_item}}
      which is a two-dimensional CSG primitive represented as either a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.circular_area,circular_area}},
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.elliptic_area,elliptic_area}},
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.rectangular_area,rectangular_area}},
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.polygonal_area,polygonal_area}},
      or {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.half_space_2d,half_space_2d}}.
