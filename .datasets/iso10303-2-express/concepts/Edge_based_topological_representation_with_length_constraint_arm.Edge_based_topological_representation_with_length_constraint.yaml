data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Edge_based_topological_representation_with_length_constraint_arm.Representation,Representation}}
      that represents the edge based topological representation with length constraint
      {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **Edge_based_topological_representation_with_length_constraint** is
      a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Foundation_representation_arm.Representation,Representation}}
      that has as its items one {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Connected_edge_set,Connected_edge_set}}
      and as needed additional {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Path,Path}}s
      and {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Basic_geometric_topology_arm.Vertex_point,Vertex_point}}s
      that are within the domain of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Connected_edge_set,Connected_edge_set}}.
