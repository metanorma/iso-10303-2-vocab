data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.modified_solid,modified_solid}} that represents the modified solid with placed configuration {{entity}}'
  notes:
    - content: A *modified_solid_with_placed_configuration* is a type of *modified_solid* in which a local shape configuration is positioned and oriented by means of an *axis_placement* rather than (as in the case of earlier entities in this schema) with respect to elements of the base solid.
