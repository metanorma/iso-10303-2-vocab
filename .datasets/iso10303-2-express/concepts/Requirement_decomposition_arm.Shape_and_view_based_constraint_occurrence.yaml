  notes:
  - content: A **Shape_and_view_based_constraint_occurrence** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Requirement_decomposition_arm.View_based_constraint_occurrence,View_based_constraint_occurrence}}
      that has a basis in the characteristics of one or more {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_geometric_shape_arm.Geometric_model,Geometric_model}}
      within the context of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Requirement_decomposition_arm.View_based_constraint_occurrence.constraining_part,constraining_part}}
