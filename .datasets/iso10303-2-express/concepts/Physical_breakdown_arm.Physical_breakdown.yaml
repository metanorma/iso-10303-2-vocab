  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Physical_breakdown_arm.Breakdown,Breakdown}}
      that represents the physical breakdown {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Physical_breakdown** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_breakdown_arm.Breakdown,Breakdown}}
      that identifies a partitioning of a product into a set of related physical elements
      so as to form explicit, parent-child views that comprise the product elements.
