data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_depression,solid_with_depression}} that represents the solid with pocket {{entity}}'
  notes:
    - content: A *solid_with_pocket* is a type of *solid_with_depression* that results when a 2D closed profile is linearly extruded to generate a solid, which is then subtracted from the base solid to create a depression in it.
