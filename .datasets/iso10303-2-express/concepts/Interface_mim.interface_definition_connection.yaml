data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Interface_mim.product_definition_relationship,product_definition_relationship}}
      that represents the interface definition connection {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **interface_definition_connection** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition_relationship,product_definition_relationship}}
      that identifies an interconnection between a connected pair of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Interface_mim.interface_connector_definition,interface_connector_definition}}s
      or, if the point of interconnection is not specified, the interconnection between
      a pair of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition,product_definition}}s.
