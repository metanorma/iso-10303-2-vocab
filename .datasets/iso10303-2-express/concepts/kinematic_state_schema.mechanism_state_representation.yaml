  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:kinematic_state_schema.representation,representation}}
      that represents the mechanism state representation {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **mechanism_state_representation** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation,representation}}
      that specifies a particular state of a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:kinematic_structure_schema.mechanism_representation,mechanism_representation}}
      by applying {{urn:iso:std:iso:10303:-2:ed-1:en:tech:kinematic_state_schema.pair_value,pair_value}}s
      for each {{urn:iso:std:iso:10303:-2:ed-1:en:tech:kinematic_structure_schema.kinematic_pair,kinematic_pair}}
      of the underlying {{urn:iso:std:iso:10303:-2:ed-1:en:tech:kinematic_structure_schema.mechanism_representation,mechanism_representation}}.
