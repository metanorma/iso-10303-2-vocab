data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Mesh_topology_arm.Unstructured_mesh,Unstructured_mesh}}
      that represents the array based unstructured mesh {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **Array_based_unstructured_mesh** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Mesh_topology_arm.Unstructured_mesh,Unstructured_mesh}}
      that is a representation of an unstructured mesh designed to minimise the amount
      of data by not requiring explicit identification of the vertices of the cells
      in the mesh.
