  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the node topological relationship {{entity}}'
  notes:
    - content: |-
        A **node_topological_relationship** is a relationship between:

        * a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.node_representation,node_representation}}; and
        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.analysis_item_within_representation,analysis_item_within_representation}}

        which indicates that the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.node_representation,node_representation}} has the topological relationships of the vertex.
