data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the action view relationship {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      An **Action_view_relationship** is a relationship between:

      * an idealisation of an action for analysis; and
      * a discretised action analysis model,

      that indicates the discretised action analysis model is a model of the idealised action created for the purpose of numerical analysis.
