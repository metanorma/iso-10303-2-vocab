---
data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_chamfered_edges,solid_with_chamfered_edges}}
      that represents the solid with single offset chamfer {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A *solid_with_single_offset_chamfer* is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_chamfered_edges,solid_with_chamfered_edges}} in which the chamfers are created as follows:

      * offset curves are defined on the two faces adjoining at each edge concerned, at equal specified distances from the edge;
      * a ruled surface is constructed between the offset curves, and is used as the underlying surface of the new chamfer face.
