data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.modified_solid,modified_solid}}
      that represents the offset face solid {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An *offset_face_solid* is a type of *modified_solid* that results from
      selecting one or more faces on an existing solid and adding (or subtracting)
      a specified thickness of material to (or from) each of those faces.
