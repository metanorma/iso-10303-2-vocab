data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the datum system with associated model coordinate
      system {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Datum_system_with_associated_model_coordinate_system** is a type
      of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Datum_and_datum_systems_arm.Axis_placement_shape_element,Axis_placement_shape_element}}
      and a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Datum_and_datum_systems_arm.Datum_system,Datum_system}}
      to represent the relation between a datum system and a model coordinate system
      as defined in ISO 16792.
