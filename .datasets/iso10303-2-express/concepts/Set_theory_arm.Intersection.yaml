    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the intersection {{entity}}'
  notes:
    - content: |-
        An **Intersection** is a relationship that is between:

        * set R;
        * and set of sets {stem:[S_i]},

        that indicates set R consists of each thing that is a member of each set within {stem:[S_i]}.
