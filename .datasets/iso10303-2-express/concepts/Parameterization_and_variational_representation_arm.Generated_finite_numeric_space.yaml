  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Maths_space_arm.Maths_space,Maths_space}} that represents the generated finite numeric space {{entity}}'
  notes:
    - content: A **Generated_finite_numeric_space** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Maths_space_arm.Maths_space,Maths_space}} that defines a finite space of numerical values whose members are not enumerated but are specified in terms of a starting value and an increment, corresponding to practice in many computer programming languages.
