  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the dimension graph projection curve usage {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **dimension_graph_projection_curve_usage** is the relationship of a
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:draughting_element_schema.projection_curve,projection_curve}}
      to a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:draughting_dimension_schema.dimension_graph,dimension_graph}},
      where the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:draughting_element_schema.projection_curve,projection_curve}}
      may participate in a similar relationship with one or more {{urn:iso:std:iso:10303:-2:ed-1:en:tech:draughting_dimension_schema.dimension_graph,dimension_graph}}.
