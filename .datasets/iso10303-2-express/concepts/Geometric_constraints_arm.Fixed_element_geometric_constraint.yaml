  notes:
  - content: A **Fixed_element_geometric_constraint** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Geometric_constraints_arm.Explicit_geometric_constraint,Explicit_geometric_constraint}}
      that constrains a set of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Geometric_constraints_arm.geometric_constraint_element,geometric_constraint_element}}
      instances to be invariant, i.e., to have all their attributes fixed.
