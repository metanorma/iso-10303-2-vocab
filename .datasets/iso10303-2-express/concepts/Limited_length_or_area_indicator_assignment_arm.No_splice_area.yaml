data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Limited_length_or_area_indicator_assignment_arm.Area_based_llai,Area_based_llai}}
      that represents the no splice area {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **No_splice_area** is a type of **Area_based_llai** that defines a
      specific region of a part with a requirement for one or more indicated ply levels
      to be a continuous layer of material, without splices, within the specified
      area.
