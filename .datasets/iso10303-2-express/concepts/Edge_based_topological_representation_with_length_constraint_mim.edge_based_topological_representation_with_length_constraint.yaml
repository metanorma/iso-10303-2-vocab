data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation,representation}} that represents the edge based topological representation with length constraint {{entity}}'
  notes:
    - content: An **edge_based_topological_representation_with_length_constraint** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation,representation}} that has as its items one {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.connected_edge_set,connected_edge_set}} and as needed additional {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.path,path}}s and {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.vertex_point,vertex_point}}s that are within the domain of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.connected_edge_set,connected_edge_set}}.
