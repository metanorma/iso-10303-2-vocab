data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the mesh function {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **Mesh_function** is an application defined function that:

      * has a domain that consists of a table of real tuple spaces; The table is a one dimensional array for an unstructured mesh, but can be a rectangular array of any dimension for a structured mesh.The real tuples can have different dimensions, if the mesh contains cells of different dimensions.The real tuple spaces can have different bounds, if the mesh contains cells of different shape, such as wedges and hexhedra.
      * has a set of control values, such that the function within each cell is determined by a subset of the control values and basis for that cell. The assignment of control values to cells is determined by the topology of the mesh.A control value is usually, but not necessarily, the value of the function at a position within the mesh
      * interpolates or extrapolates separately within each cell from the control values assigned to that cell.
