    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:presentation_appearance_schema.over_riding_styled_item,over_riding_styled_item}} that represents the context dependent over riding styled item {{entity}}'
  notes:
    - content: A **context_dependent_over_riding_styled_item** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:presentation_appearance_schema.over_riding_styled_item,over_riding_styled_item}} where the style assignment takes precedence over another assigned style based on a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation,representation}}, {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation_item,representation_item}}, or combination of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation,representation}} and {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation_item,representation_item}} in which the item being styled is used.
