data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_as_individual_mim.product_definition_formation_relationship,product_definition_formation_relationship}}
      that represents the product design version to individual {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **product_design_version_to_individual** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition_formation_relationship,product_definition_formation_relationship}}
      that identifies a relationship between a version of a product design, represented
      by {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition_formation,product_definition_formation}},
      and the product that is planned to be made ({{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_as_individual_mim.product_as_planned,product_as_planned}})
      or has been made ({{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition_formation,product_definition_formation}})
      from the design.
