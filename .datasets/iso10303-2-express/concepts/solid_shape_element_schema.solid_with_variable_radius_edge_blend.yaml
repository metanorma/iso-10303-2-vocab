  notes:
    - content: A {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_variable_radius_edge_blend,solid_with_variable_radius_edge_blend}} is a type of *track_blended_solid* in which different radius values are specified at selected points of each of the edges concerned, and a specified interpolation method is used to compute blend radius values at intermediate points.
