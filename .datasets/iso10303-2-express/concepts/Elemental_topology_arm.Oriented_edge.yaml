data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Edge,Edge}}
      that represents the oriented edge {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **Oriented_edge** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Edge,Edge}}
      constructed from another edge which contains a BOOLEAN orientation flag to indicate
      whether or not the orientation of the constructed edge agrees with the orientation
      of the original edge.
