data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_as_individual_mim.product_relationship,product_relationship}}
      that represents the product design to individual {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **product_design_to_individual** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_relationship,product_relationship}}
      that identifies a relationship between a product design, represented by {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product,product}},
      and the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product,product}}
      that is planned to be made or has been made from the design.
