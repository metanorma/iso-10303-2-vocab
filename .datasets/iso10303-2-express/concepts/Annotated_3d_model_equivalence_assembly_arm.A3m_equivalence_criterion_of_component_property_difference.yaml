data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Annotated_3d_model_equivalence_assembly_arm.A3m_equivalence_criterion_for_assembly,A3m_equivalence_criterion_for_assembly}}
      that represents the a3m equivalence criterion of component property difference
      {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **A3m_equivalence_criterion_of_component_property_difference** is
      a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Annotated_3d_model_equivalence_assembly_arm.A3m_equivalence_criterion_for_assembly,A3m_equivalence_criterion_for_assembly}}
      that detects the difference between property of a leaf-level component part
      in an assembly data set and that of the corresponding leaf-level component part
      in the other assembly data set.
