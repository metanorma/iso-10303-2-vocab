data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the line and point on plane {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **line_and_point_on_plane** is a type of a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Datum_and_datum_systems_mim.line_on_plane_pcurve,line_on_plane_pcurve}}
      and is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Datum_and_datum_systems_mim.point_on_plane,point_on_plane}}
      that specifies the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometry_schema.point,point}}
      and the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometry_schema.line,line}}
      that are on the specified {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometry_schema.plane,plane}}.
