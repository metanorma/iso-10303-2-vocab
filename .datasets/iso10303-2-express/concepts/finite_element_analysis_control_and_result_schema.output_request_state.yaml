data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:finite_element_analysis_control_and_result_schema.state,state}}
      that represents the output request state {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      An {{urn:iso:std:iso:10303:-2:ed-1:en:tech:finite_element_analysis_control_and_result_schema.output_request_state,output_request_state}} is the computer readable output to be produced by an finite element analysis system as follows:

      * the attributes of the entity provide administrative information for the state of output;
      * details of the information to be produced by the finite element analysis system are supplied by the
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:finite_element_analysis_control_and_result_schema.state_definition,state_definition}} entities that reference it.
