  - content: A **Physical_unit_interconnect_definition** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Part_view_definition_arm.Part_view_definition,Part_view_definition}}
      A **Physical_unit_interconnect_definition** is referenced by members of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Physical_unit_interconnect_definition_arm.Connector_based_interconnect_definition,Connector_based_interconnect_definition}}
      that correspond to the mated connectors for the sub assemblies included in the
      design.
