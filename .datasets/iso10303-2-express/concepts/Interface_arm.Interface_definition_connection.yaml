data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the interface definition connection {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **Interface_definition_connection** is an interconnection between
      a connected pair of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Interface_arm.Interface_connector_definition,Interface_connector_definition}}s
      or, if the point of interconnection is not specified, the interconnection between
      a pair of views ({{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_view_definition_arm.Product_view_definition,Product_view_definition}}s)
      on products.
