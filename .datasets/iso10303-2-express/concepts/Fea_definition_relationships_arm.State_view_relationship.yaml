data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the state view relationship {{entity}}'
  notes:
    - content: |-
        A **State_view_relationship** is a relationship between:

        * an idealisation of a state for analysis; and
        * a discretised state analysis model,

        that indicates the discretised state analysis model is a model of the idealised state created for the purpose of numerical analysis.
