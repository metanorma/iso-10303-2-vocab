data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.modified_solid_with_placed_configuration,modified_solid_with_placed_configuration}}
      that represents the solid with shape element pattern {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A *solid_with_shape_element_pattern* is a type of *modified_solid_with_placed_configuration*
      generated when a set of replicas of any of the shape configurations created
      by a subtype of *modified_solid_with_placed_configuration* is arranged in a
      circular or rectangular pattern on the base solid.
