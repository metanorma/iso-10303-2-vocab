      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Edge_based_topological_representation_with_length_constraint_arm.Edge_curve,Edge_curve}}
      that represents the edge bounded curve with length {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **Edge_bounded_curve_with_length** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Basic_geometric_topology_arm.Edge_curve,Edge_curve}}
      in which the **edge_start** and **edge_end** are of type {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Basic_geometric_topology_arm.Vertex_point,Vertex_point}}
      and the **edge_geometry** is of type {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Edge_based_topological_representation_with_length_constraint_arm.Bounded_curve_with_length,Bounded_curve_with_length}}.
