data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Modified_solid,Modified_solid}}
      that represents the deleted face solid {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Deleted_face_solid** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Procedural_solid_model_arm.Modified_solid,Modified_solid}}
      in which some of the faces are removed and the remaining faces are thickened
      to produce a solid in the form of a thick shell.
