data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.edge,edge}} that represents the oriented edge {{entity}}'
  notes:
    - content: An **oriented_edge** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.edge,edge}}, constructed from another {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.edge,edge}} and contains a BOOLEAN orientation flag to indicate whether or not the orientation of the constructed {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.edge,edge}} agrees with the orientation of the original {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.edge,edge}}.
