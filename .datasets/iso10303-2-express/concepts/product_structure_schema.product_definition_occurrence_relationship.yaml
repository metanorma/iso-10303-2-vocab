data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the product definition occurrence relationship {{entity}}'
  notes:
    - content: A **product_definition_occurrence_relationship** is an association between a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition,product_definition}} and an {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_structure_schema.assembly_component_usage,assembly_component_usage}} in which the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition,product_definition}} referenced by the **occurrence** attribute is a specific instance of the constituent {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition,product_definition}} referenced by the {{related_product_definition,related_product_definition}} attribute of the **occurrence_usage** in the assembly {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition,product_definition}} referenced by the {{relating_product_definition,relating_product_definition}} attribute.
