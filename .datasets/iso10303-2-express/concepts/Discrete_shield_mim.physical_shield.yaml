data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Discrete_shield_mim.physical_component,physical_component}}
      that represents the physical shield {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **physical_shield** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Assembly_component_mim.physical_component,physical_component}}
      that implements the ARM concept of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Discrete_shield_arm.Physical_shield,Physical_shield}},
      when the shield is comprised of a component or components that are manufactured
      separately from the interconnect component.
