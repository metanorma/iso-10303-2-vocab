  - content: A **Part_array_feature** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Part_feature_grouping_arm.Part_group_feature,Part_group_feature}}
      that is an array of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Physical_unit_usage_view_arm.Part_feature,Part_feature}}
      whose positions are specified as members of an array, and whose tolerances are
      applied based upon the array nature of **Part_array_feature**.
