data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Layered_interconnect_module_design_arm.Routed_join_relationship,Routed_join_relationship}}
      that represents the stratum embedded physical component join relationship {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Stratum_embedded_physical_component_join_relationship** is a type
      of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Layered_interconnect_module_design_arm.Routed_join_relationship,Routed_join_relationship}},
      in which the elements to be joined, {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Layered_interconnect_module_design_arm.Layer_connection_point,Layer_connection_point}},
      and {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Layered_interconnect_module_design_arm.Layer_connection_point,Layer_connection_point}},
      shall be on different materials in the interconnect, either {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Layered_interconnect_module_design_arm.Design_layer_stratum,Design_layer_stratum}}
      or embedded physical component.
