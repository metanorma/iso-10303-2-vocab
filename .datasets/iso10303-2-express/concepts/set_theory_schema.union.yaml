  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the union {{entity}}'
  notes:
    - content: |-
        A **union** is a relationship that is between:

        * set R and
        * set of sets {Si},

        that indicates set R consists of each thing that is a member of a set within {Si}.
