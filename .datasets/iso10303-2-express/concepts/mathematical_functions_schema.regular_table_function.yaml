data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mathematical_functions_schema.linearized_table_function,linearized_table_function}}
      that represents the regular table function {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: This type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mathematical_functions_schema.linearized_table_function,linearized_table_function}}
      represents dense arrays of any dimension in which the difference in the linear
      positions corresponding to two subscript tuples can be computed as the inner
      product of the vector difference of the tuples with a constant tuple.
