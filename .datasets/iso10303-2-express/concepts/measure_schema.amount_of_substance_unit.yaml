  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:measure_schema.named_unit,named_unit}}
      that represents the amount of substance unit {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
