  - content: An **amount_of_substance_unit** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:measure_schema.named_unit,named_unit}}
      in which the number of elementary entities of a substance as compared to the
      number of atoms in 0.012 kilograms of carbon-12 is expressed.
