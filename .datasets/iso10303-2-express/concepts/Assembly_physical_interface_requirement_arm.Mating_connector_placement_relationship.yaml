data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the mating connector placement relationship {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Mating_connector_placement_relationship** is an association between
      the connector that the interface connector on the assembly must mate with in
      the next higher assembly, and the resultant placement of that mating connector
      in the assembly being designed for test and evaluation.
