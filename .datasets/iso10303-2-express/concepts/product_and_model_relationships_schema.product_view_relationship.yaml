data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the product view relationship {{entity}}'
  notes:
    - content: |-
        A **product_view_relationship** is a relationship that is between:

        * an idealisation of a product for analysis; and
        * a discretised analysis model

        which indicates that the discretised analysis model is a model of the idealised product created for the purpose of numerical analysis.
