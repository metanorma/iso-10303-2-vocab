  notes:
  - content: An **Explicit_unstructured_mesh** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Mesh_topology_arm.Unstructured_mesh,Unstructured_mesh}}
      that is a representation of an unstructured mesh that is similar, but not entirely
      identical to, that specified in ISO 10303-104.
