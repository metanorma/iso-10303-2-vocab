data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the union of all members {{entity}}'
  notes:
    - content: |-
        A **union_of_all_members** is a relationship that is between:

        * set R and
        * sets S,

        where each of the members of S is a set, that indicates set R consists of each thing that is a member of a set within S.
