  notes:
  - content: A **Polar_point** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_geometric_shape_arm.Cartesian_point,Cartesian_point}}
      which uses a two dimensional polar coordinate system, centred at the origin
      of the corresponding Cartesian coordinate system, to define its location.
