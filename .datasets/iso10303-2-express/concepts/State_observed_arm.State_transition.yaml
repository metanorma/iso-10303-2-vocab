data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:State_observed_arm.State_relationship,State_relationship}}
      that represents the state transition {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **State_transition** is a type of state relationship and it relates
      two or more states before and after a transition in {{urn:iso:std:iso:10303:-2:ed-1:en:tech:State_observed_arm.State,State}},
      where at least one {{urn:iso:std:iso:10303:-2:ed-1:en:tech:State_observed_arm.State,State}}
      is a start state and at least one {{urn:iso:std:iso:10303:-2:ed-1:en:tech:State_observed_arm.State,State}}
      is an end state.
