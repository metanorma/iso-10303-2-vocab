data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.open_shell,open_shell}} that represents the oriented open shell {{entity}}'
  notes:
    - content: An **oriented_open_shell** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.open_shell,open_shell}}, constructed from another {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.open_shell,open_shell}} and contains a BOOLEAN direction flag to indicate whether or not the orientation of the constructed {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.open_shell,open_shell}} agrees with the orientation of the original {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.open_shell,open_shell}}.
