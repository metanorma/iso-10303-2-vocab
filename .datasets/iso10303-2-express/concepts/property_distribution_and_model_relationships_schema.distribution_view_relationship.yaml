data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the distribution view relationship {{entity}}'
  notes:
    - content: |-
        A **distribution_view_relationship** is a relationship between:

        * a property distribution over an idealisation of a product, action or state for analysis; and
        * a discretised model of a property distribution obtained by analysis

        which indicates that the discretised model is a model of the property distribution.
