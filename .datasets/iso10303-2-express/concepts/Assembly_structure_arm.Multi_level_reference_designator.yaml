  notes:
    - content: A **Multi_level_reference_designator** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Assembly_structure_arm.Assembly_component_relationship,Assembly_component_relationship}} that specifies the relationship between an assembly and a constituent if the assembly is not the immediate parent for the constituent and there are several hierarchical levels between the assembly and the constituent.
