data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.shape_representation,shape_representation}}
      that represents the hybrid brep shape representation {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **hybrid_brep_shape_representation** is a type of
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_representation_schema.shape_representation,shape_representation}} in which the geometry is represented by one or more of:
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.hybrid_brep_face_assignment,hybrid_brep_face_assignment}}, or
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.hybrid_brep_edge_assignment,hybrid_brep_edge_assignment}}, or
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.hybrid_brep_vertex_assignment,hybrid_brep_vertex_assignment}}, or
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.mapped_item,mapped_item}}.
