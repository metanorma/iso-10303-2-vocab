data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Machining_features_arm.Bevel_gear,Bevel_gear}}
      that represents the helical bevel gear {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Helical_bevel_gear** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Machining_features_arm.Bevel_gear,Bevel_gear}}
      where the tooth traces are non-cylindrical helices, joining the definitions
      of as of a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Machining_features_arm.Bevel_gear,Bevel_gear}}
      and a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Machining_features_arm.Helical_gear,Helical_gear}}.
