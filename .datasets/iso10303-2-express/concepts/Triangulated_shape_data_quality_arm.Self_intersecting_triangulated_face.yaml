data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Triangulated_shape_data_quality_arm.A3m_inapt_triangulated_shape_data,A3m_inapt_triangulated_shape_data}} that represents the self intersecting triangulated face {{entity}}'
  notes:
