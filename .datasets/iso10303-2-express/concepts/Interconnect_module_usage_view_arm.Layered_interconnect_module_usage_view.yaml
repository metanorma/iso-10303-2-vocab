data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Interconnect_module_usage_view_arm.Interconnect_module_usage_view,Interconnect_module_usage_view}}
      that represents the layered interconnect module usage view {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Layered_interconnect_module_usage_view** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Interconnect_module_usage_view_arm.Interconnect_module_usage_view,Interconnect_module_usage_view}}
      that provides the information necessary to include the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Layered_interconnect_module_design_arm.Layered_interconnect_module_design_view,Layered_interconnect_module_design_view}}
      in its next higher level assembly for design and some simulation purposes, but
      may not include sufficient information to reproduce the Pcb.
