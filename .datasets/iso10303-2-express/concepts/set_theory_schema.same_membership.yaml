data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the same membership {{entity}}'
  notes:
    - content: |-
        A **same_membership** is a relationship that is between:

        * set S1 and
        * set S2,

        that indicates the sets have the same members. Hence, set S1 and set S1 are the same set.
