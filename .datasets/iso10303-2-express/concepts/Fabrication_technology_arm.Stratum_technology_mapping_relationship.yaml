  notes:
  - content: A **Stratum_technology_mapping_relationship** is a relationship between
      a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Fabrication_technology_arm.Footprint_library_stratum_technology,Footprint_library_stratum_technology}}
      and a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Fabrication_technology_arm.Stratum_technology,Stratum_technology}}
      included to specify a formal relationship between a more general model and a
      more specific model where the more specific model includes thickness.
