  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Solid_with_edge_modification,Solid_with_edge_modification}}
      that represents the solid with simple chamfer {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Solid_with_simple_chamfer** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Solid_with_edge_modification,Solid_with_edge_modification}}
      in which the modified edges are chamfered connecting points at equal distances
      from the modified edge on adjacent faces.
