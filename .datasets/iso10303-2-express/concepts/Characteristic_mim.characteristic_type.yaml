data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Characteristic_mim.group,group}}
      that represents the characteristic type {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **characteristic_type** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:group_schema.group,group}}
      that specifies a boolean property, a numeric property whose units are in accordance
      with ISO 10303-41, a compound characteristic, a logical property, a string property,
      or an externally defined property for a characteristic.
