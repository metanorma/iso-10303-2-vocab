  - content: A **Perpendicular_assembly_constraint** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Assembly_constraints_arm.Binary_assembly_constraint,Binary_assembly_constraint}}
      and of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Geometric_constraints_arm.Perpendicular_geometric_constraint,Perpendicular_geometric_constraint}}
