  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_state_arm.Representation,Representation}}
      that represents the mechanism state representation {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Mechanism_state_representation** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Foundation_representation_arm.Representation,Representation}}
      that specifies a particular state of a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_structure_arm.Mechanism_representation,Mechanism_representation}}
      by applying {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_state_arm.Pair_value,Pair_value}}s
      for each {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_structure_arm.Kinematic_pair,Kinematic_pair}}
      of the underlying {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_structure_arm.Mechanism_representation,Mechanism_representation}}.
