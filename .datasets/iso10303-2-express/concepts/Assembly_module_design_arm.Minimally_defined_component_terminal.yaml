  notes:
  - content: A **Minimally_defined_component_terminal** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Physical_component_feature_arm.Physical_component_terminal,Physical_component_terminal}}
      that is included to permit references to terminals without including geometric
      representations of the terminals.
