  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the same membership {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **Same_membership** is a relationship that is between:

      * set stem:[S_1], and
      * set stem:[S_2],

      that indicates the sets have the same members, that is they are equal.
