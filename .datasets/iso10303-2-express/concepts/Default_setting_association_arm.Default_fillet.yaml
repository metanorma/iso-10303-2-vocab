data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Default_setting_association_arm.Default_shape_property,Default_shape_property}}
      that represents the default fillet {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Default_fillet** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Default_setting_association_arm.Default_shape_property,Default_shape_property}}
      that is the definition of a fillet that shall be applied to each non-tangent
      continuous, concave edge of a shape model where no other fillet is specified
      and where its nature does not change from concave to convex.
