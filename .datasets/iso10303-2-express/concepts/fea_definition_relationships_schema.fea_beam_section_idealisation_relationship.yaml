data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the fea beam section idealisation relationship {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      An **fea_beam_section_idealisation_relationship** is a relationship between:

      * a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_definition_schema.general_property,general_property}} that is the structural behaviour of a cross section of a beam; and
      * a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.curve_element_section_definition,curve_element_section_definition}};

      which indicates that the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.curve_element_section_definition,curve_element_section_definition}} is an idealisation of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_definition_schema.general_property,general_property}} for the purpose of analysis.
