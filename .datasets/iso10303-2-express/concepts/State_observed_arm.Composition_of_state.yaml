data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:State_observed_arm.State_relationship,State_relationship}}
      that represents the composition of state {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Composition_of_state** is a type of state relationship and it relates
      the nature of states in relation to one another, where two or more {{urn:iso:std:iso:10303:-2:ed-1:en:tech:State_observed_arm.State,State}}
      parts compose a whole {{urn:iso:std:iso:10303:-2:ed-1:en:tech:State_observed_arm.State,State}};
      and furthermore, whole states can become parts of yet another whole {{urn:iso:std:iso:10303:-2:ed-1:en:tech:State_observed_arm.State,State}}.
