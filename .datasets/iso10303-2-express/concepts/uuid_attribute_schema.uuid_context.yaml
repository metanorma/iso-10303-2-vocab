        {{uuid,uuid}} and is included to support the use case where the enterprise desires more granular context specifiers than that provided by the
        {{urn:iso:std:iso:10303:-2:ed-1:en:tech:application_context_schema.product_definition_context,product_definition_context}} ENTITY data type.
