data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_representation_schema.characterized_item_within_representation,characterized_item_within_representation}}
      that represents the characterized chain based item within representation {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **characterized_chain_based_item_within_representation** is a type
      of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_representation_schema.characterized_item_within_representation,characterized_item_within_representation}}
      that represents a chain of representations in a graph of representations, where
      the undirected links in the graph can be instances of entity data types {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation_context,representation_context}},
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation_relationship,representation_relationship}},
      or {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.mapped_item,mapped_item}}.
