data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:classification_schema.classification_assignment,classification_assignment}}
      that represents the complete membership {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **complete_membership** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:management_resources_schema.classification_assignment,classification_assignment}} that is a relationship between:

      * set S and
      * enumerated things stem:[x_i],

      that indicates set S contains each of the things stem:[x_i] and nothing else.
