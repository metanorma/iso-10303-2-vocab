      A {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mesh_function_schema.mesh_function_basis,mesh_function_basis}} is an {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mathematical_constructs_schema.application_defined_function,application_defined_function}} that has:

      * a domain that is a real tuple space; and

      * a range that is a space of table functions.
