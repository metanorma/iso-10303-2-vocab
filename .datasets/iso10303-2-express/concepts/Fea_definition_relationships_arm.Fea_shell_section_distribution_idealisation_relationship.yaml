data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the fea shell section distribution idealisation
      relationship {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **Fea_shell_section_distribution_idealisation_relationship** is a relationship between:

      * the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Property_assignment_arm.Assigned_property,Assigned_property}} that is the variation of structural behaviour from point to point over a shell; and
      * a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Finite_elements_arm.Surface_property,Surface_property}};

      that indicates the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Finite_elements_arm.Surface_property,Surface_property}} is an idealisation of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_definition_schema.property_definition,property_definition}} for the purpose of analysis.
