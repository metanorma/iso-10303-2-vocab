data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_hole,solid_with_hole}}
      that represents the solid with stepped round hole {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A *solid_with_stepped_round_hole* is a type of *solid_with_hole* where
      the hole is made up of a sequence of coaxial cylindrical segments, each segment
      after the first having a different radius from its predecessor in the sequence.
