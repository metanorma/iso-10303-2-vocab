    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:explicit_constraint_schema.explicit_constraint,explicit_constraint}} that represents the defined constraint {{entity}}'
  notes:
    - content: The {{urn:iso:std:iso:10303:-2:ed-1:en:tech:explicit_constraint_schema.defined_constraint,defined_constraint}} entity data type is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:explicit_constraint_schema.explicit_constraint,explicit_constraint}}, and the abstract supertype of a class of constraints defined in descriptive terms, with no specification of a precise mathematical relationship between parameters and entity data type instance attributes.
