  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Solid_with_local_modification_arm.Modified_solid,Modified_solid}}
      that represents the sculptured solid {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Sculptured_solid** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Procedural_solid_model_arm.Modified_solid,Modified_solid}}
      in which a solid is cut by a surface, face or shell to remove part of the material
      leaving a smaller solid model.
