data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:explicit_geometric_constraint_schema.explicit_geometric_constraint,explicit_geometric_constraint}}
      that represents the parallel geometric constraint {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: The *parallel_geometric_constraint* entity data type is a type of *explicit_geometric_constraint*
      asserting that the members of a set of two or more *linear_geometry_constraint_element*
      instances (lines, planes, directions or vectors) are mutually parallel.
