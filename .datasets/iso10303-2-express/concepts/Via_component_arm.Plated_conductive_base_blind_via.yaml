data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Via_component_arm.Blind_via,Blind_via}}
      that represents the plated conductive base blind via {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Plated_conductive_base_blind_via** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Via_component_arm.Blind_via,Blind_via}}
      in which the material that composes the floor of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Via_component_arm.Blind_via,Blind_via}}
      is conductive, and in which the floor material of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Via_component_arm.Blind_via,Blind_via}}
      is contiguous with the material on the wall of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Via_component_arm.Blind_via,Blind_via}}.
