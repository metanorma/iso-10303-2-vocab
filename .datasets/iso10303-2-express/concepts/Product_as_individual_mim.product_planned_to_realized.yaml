data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_as_individual_mim.product_definition_formation_relationship,product_definition_formation_relationship}}
      that represents the product planned to realized {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **product_planned_to_realized** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition_formation_relationship,product_definition_formation_relationship}}
      that identifies a relationship that establishes that the planned artefact represented
      by {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_as_individual_mim.product_as_planned,product_as_planned}}
      has been realized as the actual artefact {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product,product}}.
