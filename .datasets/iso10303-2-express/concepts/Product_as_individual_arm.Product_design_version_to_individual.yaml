data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the product design version to individual {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Product_design_version_to_individual** is a relationship between
      a version of a product design, represented by {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_version_arm.Product_version,Product_version}}
      or {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Configuration_item_arm.Product_configuration,Product_configuration}},
      and the product that is planned to be made ({{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_as_individual_arm.Product_as_planned,Product_as_planned}})
      or has been made ({{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_as_individual_arm.Product_as_realized,Product_as_realized}})
      from the design.
