data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_representation_schema.item_identified_representation_usage,item_identified_representation_usage}} that represents the chain based item identified representation usage {{entity}}'
  notes:
    - content: A **chain_based_item_identified_representation_usage** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_representation_schema.item_identified_representation_usage,item_identified_representation_usage}} that represents a chain of representations in a graph of representations, where the undirected links in the graph can be instances of entity data types {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation_context,representation_context}}, {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.representation_relationship,representation_relationship}}, or {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.mapped_item,mapped_item}}.
