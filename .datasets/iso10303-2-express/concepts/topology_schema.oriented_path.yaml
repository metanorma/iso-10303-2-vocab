data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.path,path}}
      that represents the oriented path {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **oriented_path** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.path,path}},
      constructed from another {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.path,path}}
      and contains a BOOLEAN orientation flag to indicate whether or not the orientation
      of the constructed {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.path,path}}
      agrees with the orientation of the original {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_schema.path,path}}.
