  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Annotated_3d_model_equivalence_assembly_arm.A3m_equivalence_criterion_of_detailed_assembly_data_content,A3m_equivalence_criterion_of_detailed_assembly_data_content}} that represents the different angle of assembly constraint {{entity}}'
  notes:
    - content: A **Different_angle_of_assembly_constraint** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Annotated_3d_model_equivalence_assembly_arm.A3m_equivalence_criterion_of_detailed_assembly_data_content,A3m_equivalence_criterion_of_detailed_assembly_data_content}} that asserts that the angle dimension specified in an assembly constraint between a component and its connected component in the comparing assembly data set is different from that of the corresponding assembly constraint in the compared assembly data set.
