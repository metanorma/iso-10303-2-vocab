  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.fea_representation_item,fea_representation_item}} that represents the arbitrary volume 2d element coordinate system {{entity}}'
  notes:
    - content: An {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.arbitrary_volume_2d_element_coordinate_system,arbitrary_volume_2d_element_coordinate_system}} specifies an arbitrary orthogonal coordinate system for a volume 2D element, for which the stem:[x] axis shall be normal to the 2D analysis plane and in the direction of the stem:[k] axis of the 2D analysis plane definition coordinate system.
