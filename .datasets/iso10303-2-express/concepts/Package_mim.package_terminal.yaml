data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Package_mim.placed_feature,placed_feature}}
      that represents the package terminal {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **package_terminal** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_feature_mim.placed_feature,placed_feature}} that implements the ARM concepts of:

      * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Altered_package_arm.Altered_package_terminal,Altered_package_terminal}};
      * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Package_arm.Guided_wave_terminal,Guided_wave_terminal}};
      * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Altered_package_arm.Length_trimmed_terminal,Length_trimmed_terminal}};
      * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Package_arm.Package_terminal,Package_terminal}};
      * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Altered_package_arm.Shape_formed_terminal,Shape_formed_terminal}};
      * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Altered_package_arm.Surface_prepped_terminal,Surface_prepped_terminal}};
      * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Package_arm.Wire_terminal_template_definition,Wire_terminal_template_definition}}.
