data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:set_theory_schema.subset,subset}}
      that represents the proper subset {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **proper_subset** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:set_theory_schema.subset,subset}} that is a relationship between:

      * set A and
      * set B,

      that indicates the following:

      * each member of set A is also a member of set B;
      * set A does not equal set B.
