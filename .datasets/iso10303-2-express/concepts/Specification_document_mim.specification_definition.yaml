data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition,product_definition}} that represents the specification definition {{entity}}'
  notes:
    - content: |-
        An **specification_definition** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_definition_schema.product_definition,product_definition}} which implements the ARM concepts of:

        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_document_arm.Design_specification,Design_specification}};
        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_document_arm.Specification_definition,Specification_definition}};
        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_document_arm.Fabrication_technology_specification,Fabrication_technology_specification}};
        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_document_arm.Interface_specification_document_definition,Interface_specification_document_definition}};
        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_document_arm.Language_reference_manual,Language_reference_manual}};
        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_document_arm.Material_specification,Material_specification}};
        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_document_arm.Process_specification,Process_specification}};
        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_document_arm.Surface_finish_specification,Surface_finish_specification}};
        * {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_document_arm.Test_specification,Test_specification}}.
