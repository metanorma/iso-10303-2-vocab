data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Advanced_boundary_representation_arm.Closed_shell,Closed_shell}}
      that represents the oriented closed shell {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **Oriented_closed_shell** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Advanced_boundary_representation_arm.Closed_shell,Closed_shell}}
      constructed by referencing another {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Advanced_boundary_representation_arm.Closed_shell,Closed_shell}}
      and contains a BOOLEAN orientation flag to indicate whether or not the orientation
      of the constructed {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Advanced_boundary_representation_arm.Closed_shell,Closed_shell}}
      agrees with, or is opposite to, the orientation of the original {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Advanced_boundary_representation_arm.Closed_shell,Closed_shell}}.
