data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_composition_arm.Composite_shape_element,Composite_shape_element}}
      that represents the composite group shape element {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Composite_group_shape_element** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_composition_arm.Composite_shape_element,Composite_shape_element}}
      in which the composite may be thought of as a group of individual {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_property_assignment_arm.Shape_element,Shape_element}}
      in which any property that is applied to the **Composite_group_shape_element**
      is applied to each of the constituent {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_property_assignment_arm.Shape_element,Shape_element}}s
      on an individual basis.
