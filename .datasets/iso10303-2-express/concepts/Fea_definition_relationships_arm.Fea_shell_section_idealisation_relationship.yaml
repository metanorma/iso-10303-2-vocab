data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that represents the fea shell section idealisation relationship {{entity}}'
  notes:
    - content: |-
        A **Fea_shell_section_idealisation_relationship** is a relationship between:

        * an {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Independent_property_arm.Independent_property,Independent_property}} that is the structural behaviour at a point on a shell; and
        * a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Finite_elements_arm.Surface_property,Surface_property}};

        that indicates the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Finite_elements_arm.Surface_property,Surface_property}} is an idealisation of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Independent_property_arm.Independent_property,Independent_property}} for the purpose of analysis.
