data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the element topological relationship {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      An **Element_topological_relationship** is a relationship between:

      * an {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Finite_elements_arm.Element_shape_aspect,Element_shape_aspect}}; and
      * a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Detailed_topological_model_element,Detailed_topological_model_element}};

      that indicates the **element_ref** has the topological relationships of the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_topology_arm.Detailed_topological_model_element,Detailed_topological_model_element}}.
