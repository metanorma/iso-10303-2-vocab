data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_representation_schema.shape_representation,shape_representation}} that represents the edge based wireframe shape representation {{entity}}'
  notes:
    - content: |-
        An *edge_based_wireframe_shape_representation* is a three-dimensional
        *shape_representation* that represents the shape, or a portion of
        the shape, of a *product* by wireframes that are trimmed by edge
        topology.
