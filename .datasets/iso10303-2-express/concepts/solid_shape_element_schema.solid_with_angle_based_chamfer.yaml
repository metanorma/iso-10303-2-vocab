    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_chamfered_edges,solid_with_chamfered_edges}} that represents the solid with angle based chamfer {{entity}}'
  notes:
    - content: A *solid_with_angle_based_chamfer* is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_chamfered_edges,solid_with_chamfered_edges}} in which the chamfers are defined in terms of an offset curve on one of the faces adjoining at the edge concerned and an offset angle measured with respect to the surface of that face.
