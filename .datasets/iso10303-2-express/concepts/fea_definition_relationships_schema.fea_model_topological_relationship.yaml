data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the fea model topological relationship {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      An **fea_model_topological_relationship** is a relationship between:

      * an {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.fea_model,fea_model}}; and
      * a mesh;

      which indicates that the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:structural_response_representation_schema.fea_model,fea_model}} has the topological relationships of the mesh.
