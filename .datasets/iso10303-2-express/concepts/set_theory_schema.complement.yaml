data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the complement {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **complement** is a relationship that is between:

      * set S1,
      * set U, and
      * set S2,

      that indicates set S2 consists of all members of U that are not members of S1.
