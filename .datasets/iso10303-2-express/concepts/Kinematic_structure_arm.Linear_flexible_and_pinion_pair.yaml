data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_structure_arm.Low_order_kinematic_pair_with_motion_coupling,Low_order_kinematic_pair_with_motion_coupling}}
      that represents the linear flexible and pinion pair {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Linear_flexible_and_pinion_pair** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_structure_arm.Low_order_kinematic_pair_with_motion_coupling,Low_order_kinematic_pair_with_motion_coupling}}
      that describes a linear flexible link that moves around a rolling pinion where
      the rotation axis of the pinion is perpendicular to the direction of the linear
      flexible link.
