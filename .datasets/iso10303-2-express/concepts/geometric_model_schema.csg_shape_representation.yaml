      A **csg_shape_representation** is a type of
      {{urn:iso:std:iso:10303:-2:ed-1:en:tech:product_property_representation_schema.shape_representation,shape_representation}} that is three-dimensional and that represents the shape of a product using constructive solid geometry operations and techniques.
