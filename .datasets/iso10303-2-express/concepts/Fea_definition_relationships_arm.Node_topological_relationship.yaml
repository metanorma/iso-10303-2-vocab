  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the node topological relationship {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **Node_topological_relationship** is a relationship between:

      * a node representation; and
      * a vertex;

      that indicates the node representation has the topological relationships of the vertex.
