data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the product of mesh {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mesh_topology_schema.product_of_mesh,product_of_mesh}} is a relationship that is between:

      * two operands that are a 1-dimensional {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mesh_topology_schema.mesh,mesh}} and an stem:[n]-dimensional {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mesh_topology_schema.mesh,mesh}}; and

      * a product that is an stem:[(n + 1)]-dimensional {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mesh_topology_schema.mesh,mesh}},

      that indicates the stem:[(n + 1)]-dimensional {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mesh_topology_schema.mesh,mesh}} is the Cartesian product of the operands.
