data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Component_feature_arm.Shape_element,Shape_element}}
      that represents the component feature {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Component_feature** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_property_assignment_arm.Shape_element,Shape_element}}
      The location of the **Component_feature** in the assembly model is derived from
      the placement of the **associated_definition** in the assembly model and the
      placement of the **definition** model in the {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_occurrence_arm.Definition_based_product_occurrence.derived_from,derived_from}}
      model of that **associated_definition**.
