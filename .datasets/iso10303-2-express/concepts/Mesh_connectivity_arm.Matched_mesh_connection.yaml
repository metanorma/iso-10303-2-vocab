data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Mesh_connectivity_arm.Mesh_connectivity,Mesh_connectivity}}
      that represents the matched mesh connection {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A **Matched_mesh_connection** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Mesh_connectivity_arm.Mesh_connectivity,Mesh_connectivity}}
      that contains connectivity information for a mesh interface patch that is abutting
      with 1-to-1 matching between adjacent structured mesh indices (also referred
      to as C0 connectivity).
