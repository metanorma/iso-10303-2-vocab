data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Limited_length_or_area_indicator_assignment_arm.Area_based_llai,Area_based_llai}} that represents the surface preparation area {{entity}}'
  notes:
    - content: A **Surface_preparation_area** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Limited_length_or_area_indicator_assignment_arm.Area_based_llai,Area_based_llai}} that is a specification or requirement defining a specific region of a part that describes surface preparation processes and attributes required locally to meet specific product and manufacturing information or processes, including, but not limited to, secondary bonding, electrical conductivity or grounding, mating condition requirements, or sacrificial machining.
