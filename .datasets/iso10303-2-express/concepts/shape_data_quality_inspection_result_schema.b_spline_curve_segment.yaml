data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:shape_data_quality_inspection_result_schema.founded_item,founded_item}}
      that represents the b spline curve segment {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A **b_spline_curve_segment**
      is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:representation_schema.founded_item,founded_item}} and represents a location by specifying a knot span of the identified {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometry_schema.b_spline_curve,b_spline_curve}} where the parameter is larger than or equal to ({{urn:iso:std:iso:10303:-2:ed-1:en:tech:shape_data_quality_inspection_result_schema.b_spline_curve_segment.start_knot_index,start_knot_index}})th knot and less than or equal to ({{urn:iso:std:iso:10303:-2:ed-1:en:tech:shape_data_quality_inspection_result_schema.b_spline_curve_segment.start_knot_index,start_knot_index}}+1)th knot.
