data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_depression,solid_with_depression}}
      that represents the solid with groove {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: A *solid_with_groove* is a type of *solid_with_depression* that results
      from the creation of a depression extending around a surface of revolution in
      such a way that its cross-sections are constant in any plane containing the
      axis of that surface.
