      A **B_spline_curve_segment** is the representation of
      a location by specifying a knot span of the identified {{urn:iso:std:iso:10303:-2:ed-1:en:tech:B_spline_geometry_arm.B_spline_curve,B_spline_curve}} where parameter is larger than or equal to ({{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_data_quality_inspection_result_arm.B_spline_curve_segment.start_knot_index,start_knot_index}})th knot and less or equal to ({{urn:iso:std:iso:10303:-2:ed-1:en:tech:Shape_data_quality_inspection_result_arm.B_spline_curve_segment.start_knot_index,start_knot_index}}+1)th knot.
