data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Appearance_assignment_arm.Styled_element,Styled_element}} that represents the styled tessellated face or surface with texture {{entity}}'
  notes:
    - content: A **Styled_tessellated_face_or_surface_with_texture** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Appearance_assignment_arm.Styled_element,Styled_element}} that assigns a visual texture to a tessellated geometry, which may be either a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Tessellated_geometry_arm.Tessellated_face,Tessellated_face}} or a collection of tessellated faces defined in a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Tessellated_geometry_arm.Tessellated_surface_set,Tessellated_surface_set}} .
