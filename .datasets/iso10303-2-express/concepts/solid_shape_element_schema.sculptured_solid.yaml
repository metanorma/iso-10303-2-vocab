    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.modified_solid,modified_solid}} that represents the sculptured solid {{entity}}'
  notes:
    - content: A *sculptured_solid* is a type of *modified_solid* that results from using a *surface*, *face_surface*, or *surfaced_open_shell* to partition the base solid into two or more solids, of which only one is retained.
