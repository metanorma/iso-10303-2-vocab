  notes:
  - content: An **annotation_occurrence_associativity** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:presentation_definition_schema.annotation_occurrence_relationship,annotation_occurrence_relationship}}
      that relates an element of annotation to the leader or projection curve which
      visually directs information in the drawing to the element or to the fill area
      whose boundary is derived from the element.
