    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:kinematic_property_schema.kinematic_property_definition_representation,kinematic_property_definition_representation}} that represents the kinematic property mechanism representation {{entity}}'
