data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that represents the mesh function {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: |-
      A {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mesh_function_schema.mesh_function,mesh_function}} is an {{urn:iso:std:iso:10303:-2:ed-1:en:tech:mathematical_functions_schema.application_defined_function,application_defined_function}} that:

      * has a domain that consists of a table of real tuple spaces;
      +
      --
      The table is a one dimensional array for an unstructured mesh, but can be a rectangular array of any dimension for a structured mesh.
