    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_control_arm.Part_occurrence_relationship,Part_occurrence_relationship}} that represents the same time machining relationship {{entity}}'
  notes:
    - content: A **Same_time_machining_relationship** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Specification_control_arm.Part_occurrence_relationship,Part_occurrence_relationship}} A **Same_time_machining_relationship** is a relationship between two {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Product_occurrence_arm.Product_occurrence,Product_occurrence}} objects that specifies that those two objects shall be manufactured together within the same {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Process_plan_arm.Process_operation_occurrence,Process_operation_occurrence}}.
