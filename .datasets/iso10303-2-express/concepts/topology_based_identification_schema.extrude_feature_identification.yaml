data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_based_identification_schema.profile_based_feature_identification,profile_based_feature_identification}} that represents the extrude feature identification {{entity}}'
  notes:
    - content: An **extrude_feature_identification** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:topology_based_identification_schema.profile_based_feature_identification,profile_based_feature_identification}} that specifies a face relating to an extrude feature such as {{urn:iso:std:iso:10303:-2:ed-1:en:tech:geometric_model_schema.extruded_face_solid,extruded_face_solid}} in ISO 10303-42, {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_general_pocket,solid_with_general_pocket}} and {{urn:iso:std:iso:10303:-2:ed-1:en:tech:solid_shape_element_schema.solid_with_general_protrusion,solid_with_general_protrusion}} in ISO 10303-111.
