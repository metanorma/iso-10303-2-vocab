data:
  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:procedural_sketch_schema.sketch_create_curve_element,sketch_create_curve_element}} that represents the create polygon {{entity}}'
  notes:
    - content: A *create_polygon* is a type of *sketch_create_curve_element* that creates a regular n-sided polygon which is either inscribed in a circle or circumscribed about a circle, the choice being indicated by the value of the attribute *circle_type*.
