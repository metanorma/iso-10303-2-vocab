  definition:
    - content: '{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_structure_arm.High_order_kinematic_pair,High_order_kinematic_pair}} that represents the linear flexible and planar curve pair {{entity}}'
  notes:
    - content: A **Linear_flexible_and_planar_curve_pair** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_structure_arm.High_order_kinematic_pair,High_order_kinematic_pair}} that describes a linear flexible link that moves around a rotating curve where the rotation axis of the curve is perpendicular to the direction of the linear flexible link and the curve.
