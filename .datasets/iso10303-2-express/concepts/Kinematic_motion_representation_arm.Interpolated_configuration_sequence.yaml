data:
  definition:
  - content: "{{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity_data_type,entity
      data type}} that is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_motion_representation_arm.Detailed_geometric_model_element,Detailed_geometric_model_element}}
      that represents the interpolated configuration sequence {{urn:iso:std:iso:10303:-2:ed-1:en:term:express-language.entity,entity}}"
  notes:
  - content: An **Interpolated_configuration_sequence** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Elemental_geometric_shape_arm.Detailed_geometric_model_element,Detailed_geometric_model_element}}
      that represents a sequence of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_motion_representation_arm.Interpolated_configuration_segment,Interpolated_configuration_segment}}s,
      each consisting of a {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_state_arm.Mechanism_state_representation,Mechanism_state_representation}}
      at a particular parameter value and an interpolation type to the next segment
      in the sequence, or, in the case of the last segment in the sequence, to the
      first {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Kinematic_motion_representation_arm.Interpolated_configuration_segment,Interpolated_configuration_segment}}.
