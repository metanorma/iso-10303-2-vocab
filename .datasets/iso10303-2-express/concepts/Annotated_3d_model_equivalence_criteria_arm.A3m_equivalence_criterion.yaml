  notes:
    - content: An **A3m_equivalence_criterion** is a type of {{urn:iso:std:iso:10303:-2:ed-1:en:tech:Foundation_representation_arm.Representation_item,Representation_item}} that represents a criterion that is an aspect of the requirements on annotated 3d model equivalence for a pair of product data together with an inspection requirement representing the necessary conditions for appropriate inspection(s) for the judgement of whether the criterion holds or not.
