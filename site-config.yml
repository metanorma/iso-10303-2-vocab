title: ISO 10303-2 Vocabulary
description: Vocabulary for industrial automation systems and integration from ISO 10303.

datasets:
  - id: iso10303-2-terms
    localPath: datasets/iso10303-2-terms
    uri: "urn:iso:std:iso:10303:-2:ed-1:en:term:*"
    sourceRepo: https://github.com/iso-10303/iso-10303
    title: "Terms and Definitions"
    description: "Terms and definitions from ISO 10303-2 — Industrial automation systems and integration vocabulary"
    owner: ISO/TC 184/SC 4
    color: "#00629B"

  - id: iso10303-2-express
    localPath: datasets/iso10303-2-express
    uri: "urn:iso:std:iso:10303:-2:ed-1:en:tech:*"
    sourceRepo: https://github.com/iso-10303/iso-10303
    title: "EXPRESS Concepts"
    description: "EXPRESS schema concepts extracted from ISO 10303 application modules and integrated resources"
    owner: ISO/TC 184/SC 4
    color: "#0891b2"

