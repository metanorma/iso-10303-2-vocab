name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://iso-10303-2.ise
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate concept data
        run: npx concept-browser generate

      - name: Build edges
        run: npx concept-browser edges

      - name: Generate favicons
        run: node scripts/generate-favicons.mjs

      - name: Build site
        run: npx vite build --config node_modules/@glossarist/concept-browser/vite.config.ts
        env:
          SITE_TITLE: "ISO 10303-2 Vocabulary"
          SITE_FONTS_URL: "https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Roboto:wght@400;500;700&display=swap"

      - name: Generate 404 page
        run: cp dist/index.html dist/404.html 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
